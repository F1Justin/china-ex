<!DOCTYPE html>
<html lang="zh-Hans" data-loading>
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>中国地级制霸生成器 - 中国地级行政区域制霸标记生成工具</title>
	<meta name="description" content="中国地级行政区域制霸标记生成工具">
	<meta name="keywords" content="中国制霸,中国地级制霸,行政区划地图">
	<link rel="stylesheet" href="样式.css?v={version}">
</head>
<body>
<!--svg-->
<div id="设置等级">
    <h2>地区</h2>
    <a data-level="5">居住</a>
    <a data-level="4">短居</a>
    <a data-level="3">游玩</a>
    <a data-level="2">出差</a>
    <a data-level="1">路过</a>
    <a data-level="0">没去过</a>
</div>
<div id="地图控制" aria-label="地图控制">
    <button type="button" data-map-action="zoom-in" aria-label="放大" title="放大">＋</button>
    <button type="button" data-map-action="zoom-out" aria-label="缩小" title="缩小">－</button>
    <button type="button" data-map-action="reset" aria-label="复位" title="复位">◎</button>
</div>
<div id="分数显示">分数</div>
<footer>
	<span>Credit: 神奇海螺</span>
	<a id="项目链接" href="https://github.com/F1Justin/china-ex" target="_blank">GitHub</a>
	<a id="保存" class="按钮">保存成图片</a>
</footer>
<div id="输出" style="display: none;">
	<div>
		<img>
	</div>
	<p>
		手机端可长按图片
		<b>“添加到照片”</b>
	</p>
	<div>
		<a class="按钮">关闭</a>
	</div>
</div>
<script src="脚本.js?v={version}"></script>
</body>
</html>
